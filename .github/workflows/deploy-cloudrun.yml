# Deploy Project Genesis to Google Cloud Run on push to main
# Requires GitHub secrets: GCP_SA_KEY (service account JSON), GCP_PROJECT_ID

name: Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  REGION: us-central1

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Enable APIs
        run: |
          gcloud services enable run.googleapis.com containerregistry.googleapis.com cloudbuild.googleapis.com \
            --project="${{ secrets.GCP_PROJECT_ID }}" --quiet

      - name: Deploy backend
        working-directory: backend
        run: |
          gcloud builds submit --config=cloudbuild.yaml \
            --substitutions="_REGION=${{ env.REGION }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}"

      - name: Get backend URL
        id: backend
        run: |
          URL=$(gcloud run services describe project-genesis-backend \
            --region ${{ env.REGION }} \
            --format 'value(status.url)' \
            --project "${{ secrets.GCP_PROJECT_ID }}" 2>/dev/null || echo "")
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Grant public access (backend)
        run: |
          gcloud run services add-iam-policy-binding project-genesis-backend \
            --region=${{ env.REGION }} \
            --member="allUsers" \
            --role="roles/run.invoker" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --quiet 2>/dev/null || true

      - name: Deploy frontend
        working-directory: frontend
        env:
          BACKEND_URL: ${{ steps.backend.outputs.url }}
        run: |
          gcloud builds submit --config=cloudbuild.yaml \
            --substitutions="_REGION=${{ env.REGION }},_BACKEND_URL=${{ env.BACKEND_URL }},_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }},_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }},_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }},_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }},_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }},_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}"

      - name: Grant public access (frontend)
        run: |
          gcloud run services add-iam-policy-binding project-genesis-frontend \
            --region=${{ env.REGION }} \
            --member="allUsers" \
            --role="roles/run.invoker" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --quiet 2>/dev/null || true

      - name: Summary
        run: |
          echo "## Deployment complete" >> $GITHUB_STEP_SUMMARY
          echo "- Backend: ${{ steps.backend.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend: $(gcloud run services describe project-genesis-frontend --region ${{ env.REGION }} --format 'value(status.url)' --project "${{ secrets.GCP_PROJECT_ID }}")" >> $GITHUB_STEP_SUMMARY
