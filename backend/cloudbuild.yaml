steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/${PROJECT_ID}/project-genesis-backend', '.']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/${PROJECT_ID}/project-genesis-backend']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'project-genesis-backend'
      - '--image=gcr.io/${PROJECT_ID}/project-genesis-backend'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
substitutions:
  _REGION: us-central1
options:
  logging: CLOUD_LOGGING_ONLY
