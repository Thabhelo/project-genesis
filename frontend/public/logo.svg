<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="pg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#c084fc"/>
    </linearGradient>
    <linearGradient id="pg-inner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
  </defs>
  <!-- Outer ring - the glass box -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="url(#pg-grad)" stroke-width="3" opacity="0.9"/>
  <circle cx="100" cy="100" r="72" fill="none" stroke="#27272a" stroke-width="1"/>
  <!-- Globe / world core -->
  <circle cx="100" cy="100" r="45" fill="none" stroke="url(#pg-inner)" stroke-width="2" opacity="0.8"/>
  <ellipse cx="100" cy="100" rx="22" ry="45" fill="none" stroke="url(#pg-inner)" stroke-width="1.5" opacity="0.5"/>
  <ellipse cx="100" cy="100" rx="45" ry="22" fill="none" stroke="url(#pg-inner)" stroke-width="1.5" opacity="0.5"/>
  <!-- Five agents orbiting -->
  <circle cx="100" cy="28" r="6" fill="#818cf8"/>
  <circle cx="158" cy="72" r="6" fill="#c084fc"/>
  <circle cx="158" cy="128" r="6" fill="#f472b6"/>
  <circle cx="100" cy="172" r="6" fill="#fbbf24"/>
  <circle cx="42" cy="128" r="6" fill="#34d399"/>
  <!-- Genesis spark -->
  <path d="M100 42 L97 58 L100 52 L103 58 Z" fill="url(#pg-grad)"/>
</svg>
